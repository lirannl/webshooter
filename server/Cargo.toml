[package]
name = "webshooter"
edition.workspace = true
version.workspace = true
author.workspace = true
repository.workspace = true

[dependencies]
anyhow = "1.0"
base64 = "0.22.0"
bytes = { version = "1.6", features = ["serde"] }
futures-util = "0.3.30"
h3 = "0.0.4"
h3-quinn = "0.0.5"
h3-webtransport = "0.1.0"
http = "1.1"
http-bytes = { version = "0.1.0", default-features = false, features = [
    "base64",
] }
lazy_static = "1.4"
mime_guess = "2.0.4"
quinn = "0.10.2"
quinn-proto = { version = "0.10.2", default-features = false }
quinn-udp = "0.4"
rand = "0.8"
rcgen = "0.10"
regex = "1.10"
reqwest = "0.12"
rust-embed = { version = "8.3", features = ["warp", "mime-guess"] }
rustls = { version = "0.21", default-features = false, features = ["quic"] }
rustls-native-certs = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "1.0"
tokio = { version = "1.37", features = ["rt-multi-thread", "macros"] }
tokio-tungstenite = "0.21"
toml = "0.8"
warp = { version = "0.3" }
warp-embed = "0.5"
webshooter-shared = { path = "../shared", version = "0" }
