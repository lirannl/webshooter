[package]
name = "webshooter"
edition.workspace = true
version.workspace = true
author.workspace = true
repository.workspace = true

[dependencies]
aes = "0.8.4"
anyhow = "1.0"
bytes = { version = "1.6", features = ["serde"] }
clap = { version = "4.5.4", features = ["derive"] }
futures-util = "0.3.30"
http = "1.1"
http-bytes = { version = "0.1.0", default-features = false, features = [
    "base64",
] }
lazy_static = "1.4"
mime_guess = "2.0.4"
rand = "0.8"
rcgen = "0.13.1"
regex = "1.10"
reqwest = "0.12"
ring = "0.17.8"
ring-compat = "0.8.0"
rust-embed = { version = "8.3", features = ["warp", "mime-guess"] }
rustls-native-certs = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "1.0"
tokio = { version = "1.37", features = ["rt-multi-thread", "macros"] }
tokio-tungstenite = "0.21"
toml = "0.8"
untrusted = "0.9.0"
warp = { version = "0.3", features = ["tls"] }
warp-embed = "0.5"
warp-reverse-proxy = "1.0.0"
webshooter-shared = { path = "../shared", version = "0" }
