[package]
name = "webshooter"
edition.workspace = true
version.workspace = true
author.workspace = true
repository.workspace = true

[dependencies]
anyhow = "1.0"
lazy_static = "1.4"
rust-embed = {version = "8.3.0", features = ["warp"]}
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "1.0"
tokio = { version = "1.37", features = ["rt-multi-thread", "macros"] }
toml = "0.8"
warp = "0.3"
warp-embed = "0.5.0"
warp-reverse-proxy = "1"
webrtc = "0.10"
webshooter-shared = { path = "../shared", version = "0" }
